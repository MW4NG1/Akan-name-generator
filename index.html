<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Akan Name Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div>
      <img src="ghana.jpg" alt="Ghana Flag">
    <h1>Akan Name Generator</h1>
    </div>
    <p>Discover your Akan name from Ghanaian culture</p>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <h2>What is an Akan Name?</h2>
    <p>
      Akan names come from Ghanaian tradition, where people are named based on
      the day of the week they were born.
    </p>
  </section>

  <!-- FORM SECTION -->
  <section class="form-section">
    <div class="container"> 
      
      <h2>Find Your Akan Name</h2>

      <form id="akanForm">
        <input type="number" id="day" placeholder="Day (1-31)" required>
        <input type="number" id="month" placeholder="Month (1-12)" required>
        <input type="number" id="year" placeholder="Year" required>

        <select id="gender" required>
          <option value="">Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <button type="submit">Get Name</button>
      </form>

      <h2 id="result"></h2>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Akan Name Generator</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
