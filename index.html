<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Akan Name Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Akan Name Generator</h1>
    <p>Find your Akan name based on your birth date.</p>

    <form id="akanForm">
      <input type="number" id="day" placeholder="Day (1-31)" required>
      <input type="number" id="month" placeholder="Month (1-12)" required>
      <input type="number" id="year" placeholder="Year" required>

      <select id="gender" required>
        <option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <button type="submit">Get Name</button>
    </form>

    <h2 id="result"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
